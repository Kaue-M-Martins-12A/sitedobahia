<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
    <defs>
        <!-- Gradients -->
        <linearGradient id="neonBlue" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00D2FF" />
            <stop offset="100%" stop-color="#3A7BD5" />
        </linearGradient>
        <linearGradient id="neonRed" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FF416C" />
            <stop offset="100%" stop-color="#FF4B2B" />
        </linearGradient>
        
        <!-- Glow Effect -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="glowStrong" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="15" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- Background (Transparent or very dark circle for contrast) -->
    <circle cx="200" cy="200" r="190" fill="#0A0F1E" stroke="url(#neonBlue)" stroke-width="4" filter="url(#glow)"/>

    <!-- Futuristic Circuit/Math Grid Lines in background -->
    <path d="M 50 100 L 350 100 M 50 200 L 350 200 M 50 300 L 350 300" stroke="rgba(0, 210, 255, 0.1)" stroke-width="2" />
    <path d="M 100 50 L 100 350 M 200 50 L 200 350 M 300 50 L 300 350" stroke="rgba(0, 210, 255, 0.1)" stroke-width="2" />

    <!-- Abstract intertwined M and M (Marcos Matico) with a Math / Infinity vibe -->
    <g transform="translate(0, 20)">
        <!-- First M (Blue) -->
        <path d="M 80 280 L 110 120 L 170 200 L 230 120 L 250 160" 
              fill="none" 
              stroke="url(#neonBlue)" 
              stroke-width="24" 
              stroke-linecap="round" 
              stroke-linejoin="round" 
              filter="url(#glow)"/>
        
        <!-- Second M (Red) - Overlapping / Asymmetric -->
        <path d="M 150 260 L 170 180 L 230 260 L 290 120 L 320 280" 
              fill="none" 
              stroke="url(#neonRed)" 
              stroke-width="24" 
              stroke-linecap="round" 
              stroke-linejoin="round" 
              filter="url(#glow)"/>
              
        <!-- Math Integration / Tech symbol -->
        <path d="M 280 200 Q 320 180 320 220 T 360 200" 
              fill="none" 
              stroke="#FFFFFF" 
              stroke-width="8" 
              stroke-linecap="round" 
              filter="url(#glow)"/>
              
        <circle cx="95" cy="180" r="10" fill="#FFFFFF" filter="url(#glow)"/>
        <circle cx="305" cy="180" r="10" fill="#FFFFFF" filter="url(#glow)"/>
    </g>

    <!-- Typography underneath -->
    <text x="200" y="340" font-family="'Orbitron', 'Montserrat', sans-serif" font-weight="900" font-size="36" fill="#FFFFFF" text-anchor="middle" letter-spacing="4" filter="url(#glow)">
        MARCOS<tspan fill="url(#neonRed)">MATICO</tspan>
    </text>
    
    <!-- Binary / Data element -->
    <text x="200" y="365" font-family="'Courier New', monospace" font-size="12" fill="rgba(0, 210, 255, 0.5)" text-anchor="middle" letter-spacing="8">
        1011 0100 1101
    </text>
</svg>
